<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 20" width="24" height="20">
  <!-- Bicycle — isometric side view voxel style -->
  <!-- Rear wheel -->
  <circle cx="7" cy="14" r="5" stroke="#444444" stroke-width="1.5" fill="none"/>
  <circle cx="7" cy="14" r="1.5" fill="#444444"/>
  <!-- Front wheel -->
  <circle cx="19" cy="14" r="5" stroke="#444444" stroke-width="1.5" fill="none"/>
  <circle cx="19" cy="14" r="1.5" fill="#444444"/>
  <!-- Frame -->
  <line x1="7" y1="14" x2="13" y2="6" stroke="#2266aa" stroke-width="1.5"/>
  <line x1="13" y1="6" x2="19" y2="14" stroke="#2266aa" stroke-width="1.5"/>
  <line x1="7" y1="14" x2="13" y2="10" stroke="#2266aa" stroke-width="1.5"/>
  <line x1="13" y1="10" x2="19" y2="14" stroke="#2266aa" stroke-width="1.2"/>
  <!-- Seat -->
  <line x1="13" y1="6" x2="11" y2="5" stroke="#444444" stroke-width="1"/>
  <line x1="9" y1="4" x2="13" y2="4" stroke="#333333" stroke-width="2"/>
  <!-- Handlebars -->
  <line x1="13" y1="6" x2="18" y2="5" stroke="#444444" stroke-width="1"/>
  <line x1="17" y1="3" x2="19" y2="6" stroke="#333333" stroke-width="1.5"/>
  <!-- Pedal -->
  <circle cx="13" cy="10" r="1.5" fill="#555555"/>
  <line x1="11" y1="11" x2="15" y2="10" stroke="#555555" stroke-width="1"/>
</svg>
