<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 28" width="40" height="28">
  <!-- Mural wall — colorful, Stage 1-2 -->
  <!-- Wall top face -->
  <polygon points="4,10 20,2 36,10 20,18" fill="#dda060"/>
  <!-- Wall left face (the mural side) -->
  <polygon points="4,10 4,24 20,32 20,18" fill="#cc8844"/>
  <!-- Wall right side -->
  <polygon points="20,18 36,10 36,24 20,32" fill="#aa6633"/>
  <!-- Mural painting on left face — abstract human figure -->
  <!-- Sky background wash -->
  <polygon points="5,11 18,5 18,24 5,30" fill="#3399cc" opacity="0.4"/>
  <!-- Figure body -->
  <polygon points="9,20 12,18 12,26 9,28" fill="#ffaa44" opacity="0.9"/>
  <!-- Figure head -->
  <circle cx="10.5" cy="18" r="2.5" fill="#ffcc88" opacity="0.9"/>
  <!-- Arms up (freedom/joy) -->
  <line x1="9" y1="20" x2="6" y2="16" stroke="#ffaa44" stroke-width="1.5" opacity="0.9"/>
  <line x1="12" y1="20" x2="15" y2="16" stroke="#ffaa44" stroke-width="1.5" opacity="0.9"/>
  <!-- Flower -->
  <circle cx="15" cy="10" r="2" fill="#ff4499" opacity="0.8"/>
  <circle cx="15" cy="8" r="1" fill="#ffeeaa" opacity="0.7"/>
  <!-- Sun -->
  <circle cx="7" cy="13" r="2" fill="#ffdd22" opacity="0.8"/>
</svg>
