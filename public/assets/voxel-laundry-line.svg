<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 24" width="40" height="24">
  <!-- Laundry line strung between two poles -->
  <!-- Left pole -->
  <polygon points="4,4 6,3 6,24 4,24" fill="#8a7a6a"/>
  <!-- Right pole -->
  <polygon points="34,4 36,3 36,24 34,24" fill="#8a7a6a"/>
  <!-- The line -->
  <path d="M5,6 Q20,8 35,6" stroke="#888888" stroke-width="0.8" fill="none"/>
  <!-- Hanging clothes -->
  <!-- Shirt 1 -->
  <polygon points="8,7 12,6 12,13 8,14" fill="#ff8844" opacity="0.9"/>
  <polygon points="6,7 9,6 9,9 6,8" fill="#ff8844" opacity="0.9"/>
  <polygon points="12,6 15,7 15,8 12,9" fill="#ff8844" opacity="0.9"/>
  <!-- Shirt 2 -->
  <polygon points="16,7 20,6 20,13 16,14" fill="#4488ff" opacity="0.9"/>
  <polygon points="14,7 17,6 17,9 14,8" fill="#4488ff" opacity="0.9"/>
  <polygon points="20,6 23,7 23,8 20,9" fill="#4488ff" opacity="0.9"/>
  <!-- Pants -->
  <polygon points="24,7 28,6 28,15 24,16" fill="#226688" opacity="0.9"/>
  <line x1="26" y1="6" x2="26" y2="15" stroke="#1a5577" stroke-width="0.8"/>
  <!-- Small item (sock) -->
  <polygon points="30,7 32,6.5 32,11 30,11.5" fill="#ffdd44" opacity="0.9"/>
  <!-- Clothespins -->
  <circle cx="9" cy="6.5" r="1" fill="#aa8866"/>
  <circle cx="18" cy="6.2" r="1" fill="#aa8866"/>
  <circle cx="26" cy="6" r="1" fill="#aa8866"/>
  <circle cx="31" cy="6.5" r="1" fill="#aa8866"/>
</svg>
