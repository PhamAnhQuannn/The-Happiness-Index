<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 72" width="56" height="72">
  <!-- Train platform — long flat structure -->
  <!-- Platform top -->
  <polygon points="4,24 28,12 52,24 28,36" fill="#ccbbaa"/>
  <!-- Platform left -->
  <polygon points="4,24 4,44 28,56 28,36" fill="#aa9988"/>
  <!-- Platform right -->
  <polygon points="28,36 52,24 52,44 28,56" fill="#887766"/>
  <!-- Yellow safety edge left -->
  <polygon points="4,24 8,22 8,42 4,44" fill="#ffdd00" opacity="0.8"/>
  <!-- Yellow safety edge right -->
  <polygon points="48,22 52,24 52,44 48,42" fill="#ddbb00" opacity="0.8"/>
  <!-- Shelter roof posts left -->
  <polygon points="8,14 10,13 10,24 8,25" fill="#888888"/>
  <polygon points="22,8 24,7 24,18 22,19" fill="#888888"/>
  <!-- Shelter roof -->
  <polygon points="7,14 25,6 27,7 9,15" fill="#aaaaaa"/>
  <polygon points="7,15 9,15 9,20 7,20" fill="#888888"/>
  <polygon points="25,7 27,7 27,12 25,12" fill="#777777"/>
  <polygon points="7,15 27,7 27,12 7,20" fill="#999999" opacity="0.5"/>
  <!-- Schedule board -->
  <polygon points="30,16 38,12 38,20 30,24" fill="#334455"/>
  <polygon points="31,17 37,13 37,19 31,23" fill="#223344"/>
  <!-- Text lines on board -->
  <line x1="32" y1="15" x2="36" y2="13" stroke="#aabbcc" stroke-width="0.8"/>
  <line x1="32" y1="17" x2="36" y2="15" stroke="#aabbcc" stroke-width="0.8"/>
  <line x1="32" y1="19" x2="36" y2="17" stroke="#aabbcc" stroke-width="0.8"/>
  <!-- Rail track lines on ground -->
  <line x1="12" y1="43" x2="44" y2="27" stroke="#666655" stroke-width="1.5"/>
  <line x1="14" y1="46" x2="46" y2="30" stroke="#666655" stroke-width="1.5"/>
</svg>
