<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="64" height="80">
  <!-- Residential but darker/emptier for Stage 3-4 -->
  <!-- Top face -->
  <polygon points="8,28 32,14 56,28 32,42" fill="#888888"/>
  <!-- Left face -->
  <polygon points="8,28 8,62 32,76 32,42" fill="#606060"/>
  <!-- Right face -->
  <polygon points="32,42 56,28 56,62 32,76" fill="#484848"/>
  <!-- Windows mostly dark -->
  <polygon points="12,34 18,30 18,40 12,44" fill="#222233" opacity="0.9"/>
  <polygon points="20,30 26,26 26,36 20,40" fill="#444455" opacity="0.5"/>
  <!-- One lit window -->
  <polygon points="12,46 18,42 18,52 12,56" fill="#eecc88" opacity="0.6"/>
  <polygon points="20,42 26,38 26,48 20,52" fill="#222233" opacity="0.9"/>
  <!-- Right dark windows -->
  <polygon points="38,38 44,34 44,44 38,48" fill="#222233" opacity="0.9"/>
  <polygon points="46,34 52,30 52,40 46,44" fill="#222233" opacity="0.9"/>
  <polygon points="38,50 44,46 44,56 38,60" fill="#222233" opacity="0.9"/>
  <polygon points="46,46 52,42 52,52 46,56" fill="#222233" opacity="0.9"/>
  <!-- Door -->
  <polygon points="26,48 32,44 32,58 26,62" fill="#3a3a3a"/>
</svg>
