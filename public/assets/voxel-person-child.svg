<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 32" width="20" height="32">
  <!-- Child figure — small, playful, Stage 1 vitality signal -->
  <!-- Head (bigger proportion for child) -->
  <circle cx="10" cy="6" r="5" fill="#f8d0a0"/>
  <!-- Body shorter -->
  <polygon points="7,11 13,11 13,20 7,20" fill="#ff8844"/>
  <!-- Arms wide out (playing) -->
  <line x1="7" y1="13" x2="2" y2="11" stroke="#ff8844" stroke-width="2.5"/>
  <line x1="13" y1="13" x2="18" y2="11" stroke="#ff8844" stroke-width="2.5"/>
  <!-- Legs running/skipping -->
  <line x1="8" y1="20" x2="5" y2="27" stroke="#4455cc" stroke-width="2.5"/>
  <line x1="5" y1="27" x2="7" y2="31" stroke="#4455cc" stroke-width="2"/>
  <line x1="12" y1="20" x2="15" y2="26" stroke="#4455cc" stroke-width="2.5"/>
  <line x1="15" y1="26" x2="12" y2="31" stroke="#4455cc" stroke-width="2"/>
  <!-- Hair tufts -->
  <circle cx="7" cy="3" r="2" fill="#5a3a1a" opacity="0.8"/>
  <circle cx="10" cy="1" r="2.5" fill="#5a3a1a" opacity="0.8"/>
  <circle cx="13" cy="3" r="2" fill="#5a3a1a" opacity="0.8"/>
</svg>
