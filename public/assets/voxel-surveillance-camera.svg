<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 40" width="48" height="40">
  <!-- Surveillance camera — mounted on wall bracket -->
  <!-- Wall mount bracket -->
  <polygon points="20,8 26,5 26,14 20,17" fill="#555566"/>
  <polygon points="20,8 20,17 24,19 24,10" fill="#444455"/>
  <!-- Arm extending out -->
  <polygon points="20,11 26,8 34,8 28,11" fill="#666677"/>
  <polygon points="20,12 20,14 28,14 28,12" fill="#555566"/>
  <!-- Camera body -->
  <polygon points="28,6 38,6 38,16 28,16" fill="#333344" rx="2"/>
  <polygon points="28,6 38,6 40,9 30,9" fill="#444455"/>
  <polygon points="30,9 40,9 38,16 28,16" fill="#222233"/>
  <!-- Lens -->
  <circle cx="34" cy="11" r="3" fill="#1a1a2a"/>
  <circle cx="34" cy="11" r="2" fill="#111122"/>
  <circle cx="33" cy="10" r="0.8" fill="#4444aa" opacity="0.6"/>
  <!-- Red recording light -->
  <circle cx="37" cy="7" r="1" fill="#ff2222" opacity="0.9"/>
  <!-- Sweep indicator arc -->
  <path d="M 42,6 A 8,8 0 0 1 42,16" stroke="#ff222244" stroke-width="1" fill="none"/>
</svg>
