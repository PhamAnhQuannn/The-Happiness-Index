<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 28" width="40" height="28">
  <!-- Official signage — replaces mural in Stage 3-4 -->
  <!-- Wall top face -->
  <polygon points="4,10 20,2 36,10 20,18" fill="#999999"/>
  <!-- Wall left face -->
  <polygon points="4,10 4,24 20,32 20,18" fill="#777777"/>
  <!-- Wall right -->
  <polygon points="20,18 36,10 36,24 20,32" fill="#555555"/>
  <!-- Sign board on left face -->
  <polygon points="6,12 18,6 18,24 6,30" fill="#334455"/>
  <polygon points="7,13 17,7 17,23 7,29" fill="#223344"/>
  <!-- Official text lines -->
  <line x1="8" y1="11" x2="16" y2="7" stroke="#aabbcc" stroke-width="1.2"/>
  <line x1="8" y1="14" x2="16" y2="10" stroke="#aabbcc" stroke-width="1"/>
  <line x1="8" y1="17" x2="16" y2="13" stroke="#7788aa" stroke-width="0.8"/>
  <line x1="8" y1="20" x2="16" y2="16" stroke="#7788aa" stroke-width="0.8"/>
  <!-- Official emblem/logo -->
  <polygon points="9,23 12,21 15,23 12,25" fill="#4455aa" opacity="0.8"/>
  <!-- Border frame -->
  <polygon points="6,12 18,6 18,7 7,13" fill="#445566" opacity="0.5"/>
  <polygon points="6,29 18,23 18,24 6,30" fill="#445566" opacity="0.5"/>
</svg>
