<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 32" width="20" height="32">
  <!-- Person walking — lively, Stage 1 -->
  <!-- Head -->
  <circle cx="10" cy="5" r="4" fill="#f5c09a"/>
  <!-- Body -->
  <polygon points="7,9 13,9 14,19 6,19" fill="#4488cc"/>
  <!-- Left arm swinging forward -->
  <line x1="7" y1="11" x2="3" y2="17" stroke="#4488cc" stroke-width="2.5"/>
  <!-- Right arm swinging back -->
  <line x1="13" y1="11" x2="16" y2="16" stroke="#4488cc" stroke-width="2.5"/>
  <!-- Left leg forward -->
  <line x1="8" y1="19" x2="5" y2="28" stroke="#334477" stroke-width="2.5"/>
  <line x1="5" y1="28" x2="3" y2="32" stroke="#334477" stroke-width="2"/>
  <!-- Right leg back -->
  <line x1="12" y1="19" x2="14" y2="27" stroke="#334477" stroke-width="2.5"/>
  <line x1="14" y1="27" x2="16" y2="30" stroke="#334477" stroke-width="2"/>
  <!-- Hair -->
  <path d="M6,3 Q10,0 14,3" stroke="#3a2a1a" stroke-width="1.5" fill="none"/>
</svg>
