<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" preserveAspectRatio="none">
  <!-- Light fog overlay — Stage 2 atmosphere -->
  <defs>
    <radialGradient id="fogCenter" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#e8eef5" stop-opacity="0"/>
      <stop offset="70%" stop-color="#c8d8e8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#aabbcc" stop-opacity="0.35"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#fogCenter)"/>
  <!-- Subtle horizontal bands -->
  <rect width="800" height="2" y="150" fill="#c8d8e8" opacity="0.08"/>
  <rect width="800" height="2" y="300" fill="#c8d8e8" opacity="0.06"/>
  <rect width="800" height="2" y="450" fill="#c8d8e8" opacity="0.08"/>
</svg>
